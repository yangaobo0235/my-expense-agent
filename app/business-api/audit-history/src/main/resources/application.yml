server:
  port: ${AUDIT_HISTORY_PORT:25104}
spring:
  config:
    import:
      - optional:file:.env.local[.properties]
      - optional:file:../../../.env.local[.properties]
  application:
    name: my-expense-agent-audit-history
  datasource:
    url: ${EXPENSE_DATASOURCE_URL}
    username: ${EXPENSE_DATASOURCE_USERNAME}
    password: ${EXPENSE_DATASOURCE_PASSWORD}
    hikari:
      maximum-pool-size: ${AUDIT_HISTORY_DATASOURCE_POOL_SIZE:5}
  flyway:
    enabled: true
    locations: classpath:db/migration
    table: flyway_schema_history_my_expense_agent_audit
    baseline-on-migrate: true
    baseline-version: 0
expense:
  mcp:
    security:
      issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:18080/realms/my-expense-agent}
      jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://localhost:18080/realms/my-expense-agent/protocol/openid-connect/certs}
      jwt-clock-skew: ${KEYCLOAK_JWT_CLOCK_SKEW:60s}
      audiences:
        - ${AUDIT_HISTORY_MCP_AUDIENCE:audit-history-mcp}
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
